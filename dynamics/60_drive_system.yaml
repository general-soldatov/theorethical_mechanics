- choice:
    question:
      types: choice
      text_data: В каком случае выполняется закон сохранения движения центра масс?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - 'Когда геометрическая сумма всех внешних сил равна нулю: $Σ F^{внеш} = 0$'
      - 'Тогда скорость центра масс постоянна: $v_C = const$'
      wrong:
      - Когда сумма моментов внешних сил равна нулю
      - Когда внутренние силы совершают работу
      - Когда система замкнута по массе
