- choice:
    question:
      types: choice
      text_data: Как записываются дифференциальные уравнения движения системы материальных
        точек в векторной форме?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - $m_i·a_i = F_i^{внеш} + F_i^{внутр}$ для каждой точки i
      wrong:
      - $M·a_C = Σ F^{внеш}$ (только для центра масс)
      - $Σ m_i·a_i = 0$
      - $m_i·v_i = const$
