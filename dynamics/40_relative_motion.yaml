      text_data: Как учитывается сопротивление воздуха при движении материальной точки?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Вводится сила сопротивления R, направленная противоположно скорости и зависящая
        от скорости (R = -mk·v или R = -mk·v²)
