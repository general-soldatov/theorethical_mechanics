- choice:
    question:
      types: choice
      text_data: Что является основным дифференциальным уравнением относительного
        движения материальной точки, где $a_r$ — относительное ускорение, $a_e$ —
        переносное ускорение, $a_c$ — кориолисово ускорение?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - $m·a_r = F + (-m·a_e) + (-m·a_c)$
      wrong:
      - $m·a_r = F$
      - $m·a_r = F + m·a_e$
      - $m·a_r = F + m·a_c$
