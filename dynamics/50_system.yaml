      types: choice
      text_data: Что называется радиусом инерции тела относительно оси?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Величина i = √(I/m), где I — момент инерции тела относительно оси, m — масса
        тела
      - Расстояние от оси до точки, в которой нужно сосредоточить всю массу тела,
        чтобы момент инерции не изменился
      wrong:
      - Радиус тела
      - Расстояние от центра масс до оси
      - Момент инерции, деленный на массу
