      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Тело с полостью рассматривается как сплошное тело минус вырезанная часть (полость)
      wrong:
      - К телу добавляются дополнительные массы для упрощения расчета
