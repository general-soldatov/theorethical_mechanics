- choice:
    question:
      types: choice
      text_data: Как вычисляются координаты центра тяжести тела?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - $x_C = (Σ G_i · x_i) / Σ G_i$
      - $y_C = (Σ G_i · y_i) / Σ G_i$
      - $z_C = (Σ G_i · z_i) / Σ G_i$
      wrong:
      - $x_C = Σ x_i / n$ (среднее арифметическое)
      - $x_C = Σ G_i / Σ x_i$
      - $x_C = Σ (G_i + x_i) / Σ G_i$
