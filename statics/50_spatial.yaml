      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Геометрическая сумма моментов всех пар равна нулю
      - Σ M_i = 0 (векторно)
      wrong:
      - Алгебраическая сумма моментов пар равна нулю
