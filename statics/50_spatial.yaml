- choice:
    question:
      types: choice
      text_data: В чем суть теоремы Пуансо о приведении силы к центру?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Силу, приложенную к твердому телу, можно перенести параллельно самой себе
        в любой центр, добавив при этом пару сил, момент которой равен моменту переносимой
        силы относительно нового центра
      wrong:
      - Любую силу можно разложить на две составляющие
      - Силу можно переносить вдоль линии действия без изменения действия
      - Любую систему сил можно привести к динаме
