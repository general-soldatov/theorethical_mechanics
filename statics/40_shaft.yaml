- choice:
    question:
      types: choice
      text_data: В чем суть метода Риттера (метода сечений) для расчета ферм?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Ферма мысленно рассекается на две части сечением, проходящим через три стержня,
        не пересекающихся в одном узле
      - Рассматривается равновесие одной из частей, составляются уравнения моментов
        относительно точек Риттера
      wrong:
      - Последовательно вырезаются все узлы фермы
      - Все стержни заменяются пружинами
      - Метод основан на графическом построении силового многоугольника
- choice:
    question:
      types: choice
      text_data: Каковы замечания (ограничения) к методу Риттера?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Сечение должно проходить через три стержня, не пересекающихся в одной точке
      - Точка Риттера не должна лежать на линии действия других неизвестных сил
      wrong:
      - Метод применим только для ферм с параллельными поясами
      - Сечение может проходить через любое количество стержней
      - Метод не позволяет определить усилия в опорных стержнях
