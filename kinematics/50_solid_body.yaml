      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Движение, при котором все точки тела движутся по окружностям, центры которых
        лежат на одной прямой — оси вращения
      wrong:
      - Движение, при котором тело перемещается параллельно самому себе
      - Движение, при котором все точки тела имеют одинаковые скорости
      - Движение, при котором тело не деформируется
