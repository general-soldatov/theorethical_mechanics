    question:
      types: choice
      text_data: Какое движение твердого тела называется поступательным?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Движение, при котором любая прямая, проведенная в теле, остается параллельной
        своему начальному положению
      - Все точки тела движутся по одинаковым траекториям
      wrong:
      - Движение, при котором все точки тела движутся по окружностям
      - Движение, при котором тело вращается вокруг неподвижной оси
      - Движение, при котором одна точка тела остается неподвижной
- choice:
