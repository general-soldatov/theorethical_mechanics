      types: choice
      text_data: Как определить положение мгновенного центра ускорений?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - Из полюса A провести луч под углом $μ = arctg(|a_τ|/a_n) $к направлению ускорения
        полюса $a_A$ в сторону вращения (для определения МЦУ)
      - МЦУ находится на расстоянии $AQ = a_A / \sqrt{ε² + ω⁴}$ от полюса
      wrong:
      - МЦУ находится на пересечении перпендикуляров к скоростям
      - МЦУ совпадает с МЦС
      - МЦУ определяется только по ускорениям двух точек
