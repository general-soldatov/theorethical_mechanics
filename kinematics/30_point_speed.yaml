      text_data: Как выражается вектор скорости через проекции на оси декартовой системы
        координат?
      code_path: null
      image: null
      help: null
    answer:
      sample_size: null
      feedback:
        correct: ''
        wrong: ''
      correct:
      - v = v_x·i + v_y·j + v_z·k, где v_x = dx/dt, v_y = dy/dt, v_z = dz/dt
      wrong:
      - v = (dx/dt + dy/dt + dz/dt)·(i+j+k)
      - v = (d²x/dt²)·i + (d²y/dt²)·j + (d²z/dt²)·k
      - v = ∫(x+y+z) dt
